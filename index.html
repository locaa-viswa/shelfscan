<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ShelfScan — StoreSight Edge</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  :root{ --navy:#061632; --navy2:#0B1F3F; --teal:#028090; --mint:#5DCAA5;
    --mint-pale:#9FE1CB; --ink:#EAF7F2; --warn:#F2B705; --crit:#E5484D; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--navy);color:var(--ink);
    font-family:Arial,Helvetica,sans-serif;overflow:hidden;}
  #stage{position:fixed;inset:0;background:#000;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  canvas#result{display:none;}
  .hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
    align-items:flex-start;padding:14px 16px;pointer-events:none;
    background:linear-gradient(180deg,rgba(6,22,50,.78),rgba(6,22,50,0));}
  .chip{background:rgba(6,22,50,.55);backdrop-filter:blur(6px);border:1px solid rgba(159,225,203,.25);
    border-radius:12px;padding:8px 12px;line-height:1.05;}
  .chip .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mint-pale);opacity:.85;}
  .chip .v{font-size:22px;font-weight:bold;}
  .band{font-size:11px;font-weight:bold;letter-spacing:.06em;margin-top:2px;}
  #dbg{position:absolute;top:74px;left:0;right:0;text-align:center;font-family:monospace;
    font-size:11px;color:var(--mint-pale);text-shadow:0 1px 3px #000;pointer-events:none;opacity:.85;}
  #caption{position:absolute;left:0;right:0;text-align:center;font-size:13px;
    letter-spacing:.03em;color:var(--mint-pale);pointer-events:none;text-shadow:0 1px 3px #000;}
  #toast{position:absolute;top:44%;left:50%;translate:-50% -50%;background:rgba(242,183,5,.95);color:#1a1400;
    font-weight:bold;font-size:14px;padding:11px 16px;border-radius:13px;opacity:0;transition:opacity .18s;
    pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.4);text-align:center;max-width:80%;}
  #toast.show{opacity:1;}
  .bar{position:absolute;left:0;right:0;bottom:0;padding:12px 14px 18px;
    background:linear-gradient(0deg,rgba(6,22,50,.94),rgba(6,22,50,0));}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
  .stepper{display:flex;align-items:center;background:rgba(11,31,63,.7);border:1px solid rgba(159,225,203,.25);
    border-radius:12px;overflow:hidden;flex:1;}
  .stepper label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mint-pale);padding:0 8px;opacity:.85;flex:1;}
  .stepper button{width:38px;height:38px;background:transparent;border:none;color:var(--ink);font-size:20px;font-weight:bold;}
  .stepper .val{min-width:30px;text-align:center;font-size:17px;font-weight:bold;}
  .btn{border:none;border-radius:13px;font-size:16px;font-weight:bold;padding:15px;color:#fff;}
  .btn.scan{background:var(--mint);color:#04221a;width:100%;font-size:18px;}
  .btn.primary{background:var(--teal);flex:2;} .btn.ghost{background:rgba(11,31,63,.8);border:1px solid rgba(159,225,203,.3);color:var(--ink);flex:1;}
  .btn:active{transform:scale(.98);} .btn:disabled{opacity:.5;}
  .sheet{position:absolute;inset:0;background:rgba(6,22,50,.93);display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:28px;z-index:20;}
  .sheet h1{font-size:20px;margin:0 0 6px;color:#fff;} .sheet p{font-size:13px;color:var(--mint-pale);max-width:300px;line-height:1.5;}
  pre.payload{text-align:left;background:#04101f;border:1px solid rgba(159,225,203,.2);border-radius:12px;
    padding:14px;font-size:11px;color:var(--mint);max-width:340px;width:100%;overflow:auto;max-height:46vh;}
  .badge{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mint-pale);
    border:1px solid rgba(159,225,203,.3);border-radius:20px;padding:5px 12px;margin-bottom:14px;}
  .hidden{display:none!important;} .small{font-size:11px;color:var(--mint-pale);opacity:.8;margin-top:14px;}
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="overlay"></canvas>
  <canvas id="result"></canvas>
  <div id="dbg">loading…</div>
  <div id="caption">Aim at one shelf section, then tap Scan</div>

  <div class="hud">
    <div class="chip"><div class="k">Items</div><div class="v" id="itemCount">—</div></div>
    <div class="chip">
      <div class="k">Void space</div>
      <div class="v" id="voidVal" style="color:var(--mint-pale)">—</div>
      <div class="band" id="bandVal" style="color:var(--mint-pale)">IDLE</div>
    </div>
  </div>

  <div id="toast"></div>

  <div class="bar">
    <div class="row">
      <div class="stepper"><label>Aisle</label>
        <button data-step="aisle" data-d="-1">−</button><div class="val" id="aisleVal">4</div><button data-step="aisle" data-d="1">+</button></div>
      <div class="stepper"><label>Shelf</label>
        <button data-step="shelf" data-d="-1">−</button><div class="val" id="shelfVal">2</div><button data-step="shelf" data-d="1">+</button></div>
    </div>
    <div class="row" id="previewRow">
      <button class="btn scan" id="scanBtn" disabled>Loading model…</button>
    </div>
    <div class="row hidden" id="resultRow">
      <button class="btn ghost" id="againBtn">Scan again</button>
      <button class="btn primary" id="submitBtn">Submit scan</button>
    </div>
  </div>

  <div class="sheet hidden" id="errSheet">
    <div class="badge" style="border-color:var(--crit);color:#ffb4b6">Can't start</div>
    <h1 id="errTitle">Something went wrong</h1>
    <p id="errMsg"></p>
  </div>
  <div class="sheet hidden" id="doneSheet">
    <div class="badge">Scan queued</div>
    <h1>Sent to StoreSight</h1>
    <p>This is the payload the dashboard reads — geo-stamped, queryable, no image leaves the device.</p>
    <pre class="payload" id="payloadOut"></pre>
    <button class="btn primary" id="nextBtn" style="margin-top:16px;max-width:260px;width:100%">Scan next shelf</button>
  </div>
</div>

<script>
const CONFIG = {
  ZONE:{ x:0.10, y:0.34, w:0.80, h:0.30 },
  GRID_COLS:32, GRID_ROWS:12, CELL_FILL:0.30,
  MIN_SCORE:0.35, MAX_BOXES:20, CAPTURE_LONG:640,
  REDLINE_VOID:30, LUM_MIN:42, BLUR_MIN:80,
  STORE_ID:'ST-001', AUDITOR_ID:'aud_017', APP_VERSION:'0.3.0',
};
const $=id=>document.getElementById(id);
const video=$('video'), overlay=$('overlay'), octx=overlay.getContext('2d');
const result=$('result'), rctx=result.getContext('2d');
const cap=document.createElement('canvas'), cctx=cap.getContext('2d',{willReadFrequently:true});

let model=null, mode='preview', aisle=4, shelf=2;
let lastVoid=null, lastCount=0, lastQuality=1, lastMs=0, backend='';
const track=()=>(video.srcObject&&video.srcObject.getVideoTracks()[0])||null;
function dbg(extra){ $('dbg').textContent = `tf:${backend||'…'}${lastMs?` · ${lastMs}ms`:''}${extra?` · ${extra}`:''}`; }

async function start(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
    video.srcObject=stream; await video.play(); sizeCanvases();
  }catch(e){ return fail('Camera blocked','Allow camera access and reload. Needs the rear camera over HTTPS.'); }

  requestAnimationFrame(previewLoop);
  try{
    await tf.ready(); backend=tf.getBackend(); dbg('model loading');
    model=await cocoSsd.load({base:'lite_mobilenet_v2'});  // fastest variant
    $('scanBtn').disabled=false; $('scanBtn').textContent='Scan'; dbg('ready');
  }catch(e){ return fail('Model failed to load', String(e.message||e)); }
}

function sizeCanvases(){ for(const c of [overlay,result]){ c.width=c.clientWidth; c.height=c.clientHeight; } }
addEventListener('resize', sizeCanvases);

/* live preview: only draws the target zone (no inference) */
function previewLoop(){
  if(mode==='preview'){
    const W=overlay.width,H=overlay.height,z=CONFIG.ZONE;
    octx.clearRect(0,0,W,H);
    octx.fillStyle='rgba(6,22,50,.30)'; octx.fillRect(0,0,W,H);
    octx.clearRect(z.x*W,z.y*H,z.w*W,z.h*H);
    octx.strokeStyle='rgba(159,225,203,.9)'; octx.lineWidth=2; octx.strokeRect(z.x*W,z.y*H,z.w*W,z.h*H);
    $('caption').style.top=(z.y*H-26)+'px';
  }
  requestAnimationFrame(previewLoop);
}

/* cover-crop the live video into the capture canvas (matches what the user sees) */
function grabFrame(){
  const vw=video.videoWidth, vh=video.videoHeight;
  let cw=overlay.width, ch=overlay.height;
  const s=CONFIG.CAPTURE_LONG/Math.max(cw,ch); if(s<1){ cw=Math.round(cw*s); ch=Math.round(ch*s); }
  cap.width=cw; cap.height=ch;
  const dispA=cw/ch, vidA=vw/vh; let sx,sy,sw,sh;
  if(vidA>dispA){ sh=vh; sw=vh*dispA; sx=(vw-sw)/2; sy=0; } else { sw=vw; sh=vw/dispA; sx=0; sy=(vh-sh)/2; }
  cctx.drawImage(video, sx,sy,sw,sh, 0,0, cw,ch);
}

const inZone=d=>{ const cx=d.x0+(d.x1-d.x0)/2, cy=d.y0+(d.y1-d.y0)/2, z=CONFIG.ZONE;
  return cx>=z.x&&cx<=z.x+z.w&&cy>=z.y&&cy<=z.y+z.h; };

function occFraction(dets){
  const z=CONFIG.ZONE,C=CONFIG.GRID_COLS,R=CONFIG.GRID_ROWS,kept=dets.filter(inZone);
  const cellW=z.w/C,cellH=z.h/R,cellA=cellW*cellH; let occ=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const cx0=z.x+c*cellW,cy0=z.y+r*cellH,cx1=cx0+cellW,cy1=cy0+cellH; let cover=0;
    for(const d of kept){ const ix=Math.max(0,Math.min(cx1,d.x1)-Math.max(cx0,d.x0));
      const iy=Math.max(0,Math.min(cy1,d.y1)-Math.max(cy0,d.y0)); cover+=ix*iy;
      if(cover/cellA>=CONFIG.CELL_FILL){occ++;break;} } }
  return {frac:occ/(C*R), kept};
}

function quality(){
  const QW=64,QH=48,q=document.createElement('canvas'); q.width=QW;q.height=QH;
  const qx=q.getContext('2d',{willReadFrequently:true}); qx.drawImage(cap,0,0,QW,QH);
  const px=qx.getImageData(0,0,QW,QH).data, g=new Float32Array(QW*QH); let sum=0;
  for(let i=0,j=0;i<px.length;i+=4,j++){const v=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];g[j]=v;sum+=v;}
  const lum=sum/(QW*QH);
  let ls=0,lq=0,n=0;
  for(let y=1;y<QH-1;y++)for(let x=1;x<QW-1;x++){const i=y*QW+x;
    const lap=4*g[i]-g[i-1]-g[i+1]-g[i-QW]-g[i+QW];ls+=lap;lq+=lap*lap;n++;}
  const blur=(lq/n)-(ls/n)**2;
  let qs=1,warn=null;
  if(lum<CONFIG.LUM_MIN){qs-=0.5;warn='A bit dark — turn on the flashlight for a better read';}
  else if(blur<CONFIG.BLUR_MIN){qs-=0.3;warn='Slightly blurry — hold steady and rescan';}
  return {qs:Math.max(0,qs),warn};
}

async function scan(){
  if(!model) return;
  $('scanBtn').disabled=true; $('scanBtn').textContent='Analyzing…';
  await new Promise(r=>setTimeout(r,30));
  grabFrame();
  const {qs,warn}=quality(); lastQuality=qs;

  const t0=performance.now();
  const preds=await model.detect(cap, CONFIG.MAX_BOXES, CONFIG.MIN_SCORE);
  lastMs=Math.round(performance.now()-t0);

  const dets=preds.map(p=>({ x0:p.bbox[0]/cap.width, y0:p.bbox[1]/cap.height,
    x1:(p.bbox[0]+p.bbox[2])/cap.width, y1:(p.bbox[1]+p.bbox[3])/cap.height, s:p.score }));
  const {frac,kept}=occFraction(dets);
  lastCount=kept.length;
  lastVoid=Math.max(0,Math.min(100,(1-frac)*100));

  showResult(kept); paintHUD(); dbg(`found ${preds.length}`);
  if(warn) showToast(warn);
  mode='result';
  $('previewRow').classList.add('hidden'); $('resultRow').classList.remove('hidden');
  $('caption').textContent='';
  $('scanBtn').disabled=false; $('scanBtn').textContent='Scan';
}

function showResult(kept){
  result.width=overlay.width; result.height=overlay.height;
  const W=result.width,H=result.height,z=CONFIG.ZONE;
  rctx.drawImage(cap,0,0,W,H);
  rctx.fillStyle='rgba(6,22,50,.32)'; rctx.fillRect(0,0,W,H);
  rctx.clearRect(z.x*W,z.y*H,z.w*W,z.h*H);
  rctx.drawImage(cap, z.x*cap.width,z.y*cap.height,z.w*cap.width,z.h*cap.height, z.x*W,z.y*H,z.w*W,z.h*H);
  rctx.strokeStyle='rgba(159,225,203,.9)'; rctx.lineWidth=2; rctx.strokeRect(z.x*W,z.y*H,z.w*W,z.h*H);
  rctx.strokeStyle='rgba(93,202,165,.95)'; rctx.lineWidth=2;
  for(const d of kept) rctx.strokeRect(d.x0*W,d.y0*H,(d.x1-d.x0)*W,(d.y1-d.y0)*H);
  overlay.style.display='none'; result.style.display='block';
}

function paintHUD(){
  $('itemCount').textContent=lastCount;
  const v=Math.round(lastVoid); $('voidVal').textContent=v+'%';
  let band,col; if(v>=60){band='CRITICAL';col='var(--crit)';}
  else if(v>=CONFIG.REDLINE_VOID){band='LOW';col='var(--warn)';} else{band='FULL';col='var(--mint)';}
  $('voidVal').style.color=col; $('bandVal').textContent=band; $('bandVal').style.color=col;
}

function backToPreview(){
  mode='preview'; result.style.display='none'; overlay.style.display='block';
  $('resultRow').classList.add('hidden'); $('previewRow').classList.remove('hidden');
  $('caption').textContent='Aim at one shelf section, then tap Scan';
  $('itemCount').textContent='—'; $('voidVal').textContent='—'; $('voidVal').style.color='var(--mint-pale)';
  $('bandVal').textContent='IDLE'; $('bandVal').style.color='var(--mint-pale)';
}

let toastTimer=null;
function showToast(msg){const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

$('scanBtn').onclick=scan;
$('againBtn').onclick=backToPreview;
document.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{const d=+b.dataset.d;
  if(b.dataset.step==='aisle'){aisle=Math.max(1,aisle+d);$('aisleVal').textContent=aisle;}
  else{shelf=Math.max(1,shelf+d);$('shelfVal').textContent=shelf;}});

$('submitBtn').onclick=async()=>{
  $('submitBtn').disabled=true; const geo=await getGeo();
  const v=Math.round(lastVoid*10)/10, band=v>=60?'Critical':(v>=CONFIG.REDLINE_VOID?'Low':'Full');
  const payload={scan_id:crypto.randomUUID(),store_id:CONFIG.STORE_ID,auditor_id:CONFIG.AUDITOR_ID,
    aisle_number:aisle,shelf_level:shelf,total_items_detected:lastCount,void_percentage:v,fullness_band:band,
    baseline_ref:null,quality_score:Math.round(lastQuality*100)/100,geo,thumbnail_url:null,
    device_model:navigator.userAgent.match(/\(([^)]+)\)/)?.[1]?.split(';').slice(-2).join(';').trim()||'unknown',
    app_version:CONFIG.APP_VERSION,captured_at:new Date().toISOString(),synced_at:null};
  console.log('[ShelfScan] payload',payload);
  $('payloadOut').textContent=JSON.stringify(payload,null,2);
  $('doneSheet').classList.remove('hidden');
};
function getGeo(){return new Promise(res=>{ if(!navigator.geolocation)return res(null);
  navigator.geolocation.getCurrentPosition(
    p=>res({lat:+p.coords.latitude.toFixed(5),lng:+p.coords.longitude.toFixed(5),accuracy_m:Math.round(p.coords.accuracy)}),
    ()=>res(null),{enableHighAccuracy:true,timeout:4000}); });}
$('nextBtn').onclick=()=>{$('doneSheet').classList.add('hidden');$('submitBtn').disabled=false;backToPreview();};

function fail(t,m){$('errTitle').textContent=t;$('errMsg').textContent=m;$('errSheet').classList.remove('hidden');}

start();
</script>
</body>
</html>
